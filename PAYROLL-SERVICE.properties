spring.application.name=PAYROLL-SERVICE
server.port=8083

eureka.client.service-url.defaultZone=http://localhost:8761/eureka


#Circit Breakers
#for employees
resilience4j.circuitbreaker.instances.employeeService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.employeeService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.employeeService.slidingWindowSize=10

# for departments
resilience4j.circuitbreaker.instances.departmentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.departmentService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.departmentService.slidingWindowSize=10
